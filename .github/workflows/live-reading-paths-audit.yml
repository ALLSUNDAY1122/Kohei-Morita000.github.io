name: Live Reading Paths Audit

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'data/archive-tools.js'
      - 'data/reading-paths.css'
      - 'scripts/audit-live-reading-paths.mjs'
      - '.github/workflows/live-reading-paths-audit.yml'
  workflow_dispatch:

concurrency:
  group: live-reading-paths-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Pages and audit production
        id: live_audit
        continue-on-error: true
        shell: bash
        run: |
          for attempt in {1..30}; do
            echo "Production audit attempt ${attempt}/30"
            if node scripts/audit-live-reading-paths.mjs; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Commit production audit report
        if: always()
        shell: bash
        run: |
          if [ ! -f reports/live-reading-paths-audit.md ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/live-reading-paths-audit.md
          if git diff --cached --quiet; then
            echo "Production reading paths report is unchanged."
            exit 0
          fi
          git commit -m "chore: record reading path production audit"
          git pull --rebase origin main
          git push

      - name: Fail when production audit errors exist
        if: steps.live_audit.outcome == 'failure'
        run: exit 1
