name: Patch SKK-006 listing

on:
  push:
    paths:
      - .github/workflows/patch-skk006.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch index and sitemap
        shell: python
        run: |
          from pathlib import Path

          index_path = Path("index.html")
          sitemap_path = Path("sitemap.xml")
          index = index_path.read_text(encoding="utf-8")
          sitemap = sitemap_path.read_text(encoding="utf-8")

          story_path = "/kyokai-yawa/stories/skk-006-daremo-tsukawanai-yobina.html"
          story_url = "https://allsunday1122.github.io" + story_path

          if story_path not in index:
              card = '''      <a class="work-card" href="/kyokai-yawa/stories/skk-006-daremo-tsukawanai-yobina.html"><div><span class="id">SKK-006 · 榊家異聞</span><h3>誰も使わない呼び名</h3><p>誰も使った記憶のない呼び名が、家族の姉妹順、介護、通学、役割の記憶を人から人へ移していく。</p></div><div class="work-meta"><span class="tag">中編</span><span class="tag">約10分</span><span class="tag">恐怖 4</span></div></a>\n'''
              marker = '      <a class="work-card" href="/kyokai-yawa/stories/skk-010-futatsu-no-ie-no-komoriuta.html">'
              if marker not in index:
                  raise SystemExit("SKK-010 card marker not found")
              index = index.replace(marker, card + marker, 1)

              series_old = '<article class="series-card" id="series-sakaki"><div class="series-card-head"><div class="series-title-row"><h3>榊家異聞</h3><span class="series-count">6話公開</span>'
              series_new = '<article class="series-card" id="series-sakaki"><div class="series-card-head"><div class="series-title-row"><h3>榊家異聞</h3><span class="series-count">7話公開</span>'
              if series_old not in index:
                  raise SystemExit("Sakaki series count marker not found")
              index = index.replace(series_old, series_new, 1)

              list_marker = '<li><a class="story-link" href="/kyokai-yawa/stories/skk-010-futatsu-no-ie-no-komoriuta.html">'
              list_item = '<li><a class="story-link" href="/kyokai-yawa/stories/skk-006-daremo-tsukawanai-yobina.html"><span class="story-id">SKK-006</span><span class="story-title">誰も使わない呼び名</span><span class="story-arrow">›</span></a></li>'
              if list_marker not in index:
                  raise SystemExit("SKK-010 list marker not found")
              index = index.replace(list_marker, list_item + list_marker, 1)

              index = index.replace('家族の記憶と弁当箱、雨宿りと観測された境界の話。', '家族の記憶、呼び名と弁当箱、雨宿りと観測された境界の話。', 1)
              index_path.write_text(index, encoding="utf-8")

          if story_url not in sitemap:
              marker = '  <url><loc>https://allsunday1122.github.io/kyokai-yawa/stories/skk-010-futatsu-no-ie-no-komoriuta.html</loc>'
              item = '  <url><loc>' + story_url + '</loc><lastmod>2026-07-18</lastmod></url>\n'
              if marker not in sitemap:
                  raise SystemExit("SKK-010 sitemap marker not found")
              sitemap = sitemap.replace(marker, item + marker, 1)
              sitemap_path.write_text(sitemap, encoding="utf-8")

          Path(".github/workflows/patch-skk006.yml").unlink(missing_ok=True)
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sitemap.xml .github/workflows/patch-skk006.yml
          git commit -m "List SKK-006 on archive" || exit 0
          git push